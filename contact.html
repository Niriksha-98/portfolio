<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--surface:#16213e;--border:rgba(255,255,255,0.12);--text:rgba(255,255,255,0.87);--muted:rgba(255,255,255,0.5);--accent:#4a9eff;--white:#fff}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6}
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(26,26,46,0.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.navbar-inner{max-width:1100px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px}
.navbar-brand{font-size:1rem;font-weight:600;color:var(--white);text-decoration:none}
.navbar-nav{display:flex;align-items:center;gap:0.1rem;list-style:none}
.navbar-nav a{color:var(--muted);text-decoration:none;font-size:0.85rem;padding:0.35rem 0.7rem;transition:color 0.2s}
.navbar-nav a:hover,.navbar-nav a.active{color:var(--white)}
main{max-width:1000px;margin:0 auto;padding:96px 2rem 5rem}
.page-title{font-size:1.45rem;font-weight:400;color:var(--white);margin-bottom:0.8rem}
.subtitle{color:var(--muted);font-size:0.92rem;margin-bottom:2rem}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
.contact-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.4rem;text-decoration:none;color:inherit;display:flex;align-items:center;gap:1rem;transition:border-color 0.2s}
.contact-card:hover{border-color:var(--accent)}
.contact-card i{font-size:1.4rem;color:var(--accent)}
.ci-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
.ci-value{font-size:0.85rem;color:var(--white);margin-top:0.15rem}
</style>
